<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>TiRo Pride</title>
</head>
<body>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --sys-red:#FF3B30;
  --sys-orange:#FF9500;
  --sys-green:#34C759;
  --sys-blue:#007AFF;
  --sys-indigo:#5856D6;
  --sys-pink:#FF2D55;

  --deep:#000000;

  --glass:rgba(255,255,255,0.07);
  --glass-strong:rgba(255,255,255,0.14);
  --glass-border:rgba(255,255,255,0.16);
  --glass-border-strong:rgba(255,255,255,0.28);

  --text-1:#f5f5f7;
  --text-2:rgba(245,245,247,0.62);
  --text-3:rgba(245,245,247,0.38);
}

html,body{background:var(--deep)}

.mk-root{
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',Helvetica,Arial,sans-serif;
  color:var(--text-1);
  -webkit-font-smoothing:antialiased;
}

/* ───────── Mesh / aurora background ───────── */
.mesh-bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--deep)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);will-change:transform}
.orb-1{width:46vw;height:46vw;max-width:480px;max-height:480px;background:var(--sys-indigo);opacity:0.55;top:-12%;left:-14%;animation:float1 24s ease-in-out infinite}
.orb-2{width:42vw;height:42vw;max-width:430px;max-height:430px;background:var(--sys-pink);opacity:0.42;top:28%;right:-16%;animation:float2 28s ease-in-out infinite}
.orb-3{width:40vw;height:40vw;max-width:400px;max-height:400px;background:var(--sys-blue);opacity:0.4;bottom:-14%;left:6%;animation:float3 30s ease-in-out infinite}
.orb-4{width:30vw;height:30vw;max-width:300px;max-height:300px;background:var(--sys-orange);opacity:0.22;bottom:6%;right:-4%;animation:float1 26s ease-in-out infinite reverse}

@keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,7%) scale(1.07)}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-6%,5%) scale(1.05)}}
@keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4%,-6%) scale(1.08)}}

.grain{
  position:absolute;inset:0;
  opacity:0.05;
  mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='160' height='160'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,transparent 0%,rgba(0,0,0,0.35) 70%,rgba(0,0,0,0.6) 100%);
}

.spotlight{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(circle 520px at var(--mx,50%) var(--my,18%),rgba(255,255,255,0.05),transparent 70%);
}

/* ───────── Layout ───────── */
.mk-canvas{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:56px 22px 50px;
  min-height:100vh;
  max-width:440px;
  margin:0 auto;
}

/* ───────── Eyebrow pill ───────── */
.eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 16px;
  border-radius:999px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  font-size:11px;font-weight:600;letter-spacing:0.6px;
  color:var(--text-2);
  margin-bottom:26px;
  animation:focusIn 0.8s 0.05s cubic-bezier(.22,1,.36,1) both;
}
.eyebrow-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--sys-green);
  box-shadow:0 0 8px var(--sys-green);
  animation:pulse 2.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* ───────── Avatar ───────── */
.profile-wrap{position:relative;margin-bottom:24px;animation:focusIn 0.9s 0.12s cubic-bezier(.22,1,.36,1) both}
.avatar-ring{
  width:128px;height:128px;border-radius:50%;
  padding:3px;
  background:conic-gradient(from 0deg,var(--sys-indigo),var(--sys-pink),var(--sys-orange),var(--sys-blue),var(--sys-indigo));
  animation:spin 11s linear infinite;
  box-shadow:0 0 50px rgba(88,86,214,0.35),0 0 100px rgba(255,45,85,0.12);
}
@keyframes spin{to{transform:rotate(360deg)}}
.avatar-glass{
  width:100%;height:100%;border-radius:50%;
  padding:4px;
  background:rgba(10,10,16,0.7);
  backdrop-filter:blur(10px);
}
.avatar-circle{
  width:100%;height:100%;border-radius:50%;
  overflow:hidden;position:relative;
  background:radial-gradient(circle at 35% 30%,#2a2a40,#0c0c14);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:700;color:var(--text-2);
}
.avatar-circle img{width:100%;height:100%;object-fit:cover;display:block}
.avatar-circle::after{
  content:'';position:absolute;top:-20%;left:-10%;width:70%;height:55%;
  border-radius:50%;
  background:rgba(255,255,255,0.16);
  filter:blur(2px);
  pointer-events:none;
}
.verified-badge{
  position:absolute;bottom:2px;right:2px;
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(140deg,var(--sys-blue),#0050c8);
  border:2px solid rgba(0,0,0,0.85);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.4);
}
.verified-badge svg{width:14px;height:14px}

/* ───────── Typography ───────── */
.mk-title{
  font-size:clamp(24px,6vw,30px);
  font-weight:800;
  letter-spacing:-0.5px;
  text-align:center;
  color:var(--text-1);
  margin-bottom:7px;
  animation:focusIn 0.9s 0.18s cubic-bezier(.22,1,.36,1) both;
}
.mk-sub{
  font-size:12.5px;
  font-weight:500;
  color:var(--text-2);
  text-align:center;
  letter-spacing:1.6px;
  text-transform:uppercase;
  margin-bottom:34px;
  animation:focusIn 0.9s 0.24s cubic-bezier(.22,1,.36,1) both;
}
.mk-sub b{color:var(--text-3);font-weight:500;margin:0 6px}

/* ───────── Glass link cards ───────── */
.mk-links{width:100%;display:flex;flex-direction:column;gap:12px}

.glass-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  border-radius:20px;
  text-decoration:none;
  color:var(--text-1);
  position:relative;
  overflow:hidden;
  background:linear-gradient(150deg,rgba(255,255,255,0.13),rgba(255,255,255,0.04));
  border:1px solid var(--glass-border-strong);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  box-shadow:0 8px 26px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.22);
  transition:transform 0.4s cubic-bezier(.22,1,.36,1),box-shadow 0.4s;
  opacity:0;
  animation:focusIn 0.7s cubic-bezier(.22,1,.36,1) both;
}
.glass-card::before{
  content:'';
  position:absolute;top:0;left:-70%;width:35%;height:100%;
  background:linear-gradient(115deg,transparent,rgba(255,255,255,0.28),transparent);
  transform:skewX(-18deg);
  transition:left 0.7s ease;
  pointer-events:none;
}
.glass-card:hover::before{left:130%}
.glass-card:hover{transform:translateY(-3px);box-shadow:0 16px 36px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.28)}
.glass-card:active{transform:scale(0.98)}
.glass-card:focus-visible{outline:2px solid rgba(255,255,255,0.85);outline-offset:3px}

.mk-links a:nth-child(1){animation-delay:0.32s}
.mk-links a:nth-child(2){animation-delay:0.4s}
.mk-links a:nth-child(3){animation-delay:0.48s}
.mk-links a:nth-child(4){animation-delay:0.56s}

.icon-tile{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.16);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.25);
}
.icon-tile svg{width:23px;height:23px}
.icon-tile::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(160deg,var(--tint,transparent) 0%,transparent 60%);
  opacity:0.22;
}
.tile-yt{--tint:var(--sys-red)}
.tile-fb{--tint:var(--sys-blue)}
.tile-tt{--tint:#ffffff}
.tile-wa{--tint:var(--sys-green)}

.mk-btn-text{flex:1;min-width:0}
.mk-btn-name{display:block;font-size:14.5px;font-weight:600;color:var(--text-1);letter-spacing:-0.1px}
.mk-btn-handle{display:block;font-size:11.5px;color:var(--text-3);margin-top:2px;font-weight:400}

.mk-arrow{flex-shrink:0;color:var(--text-3);transition:transform 0.3s,color 0.3s}
.mk-arrow svg{width:16px;height:16px}
.glass-card:hover .mk-arrow{transform:translateX(3px);color:var(--text-2)}

/* ───────── Footer ───────── */
.mk-footer{
  text-align:center;
  margin-top:34px;
  animation:focusIn 1s 0.75s cubic-bezier(.22,1,.36,1) both;
}
.footer-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;
  border-radius:999px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  font-size:10.5px;
  letter-spacing:1.8px;
  text-transform:uppercase;
  color:var(--text-2);
  margin-bottom:12px;
}
.copyright{font-size:10.5px;color:var(--text-3);letter-spacing:0.4px}

/* ───────── Motion ───────── */
@keyframes focusIn{
  from{opacity:0;filter:blur(8px);transform:translateY(16px)}
  to{opacity:1;filter:blur(0);transform:translateY(0)}
}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important}
}
</style>

<script>
(function(){
  var root = document.documentElement;
  function setSpot(x, y){
    root.style.setProperty('--mx', x + 'px');
    root.style.setProperty('--my', y + 'px');
  }
  window.addEventListener('mousemove', function(e){ setSpot(e.clientX, e.clientY); }, {passive:true});
  window.addEventListener('touchmove', function(e){
    if(e.touches && e.touches[0]) setSpot(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});
})();
</script>
