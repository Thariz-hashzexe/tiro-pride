

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

.mk-root{
  min-height:100vh;
  background:#02030a;
  font-family:'Inter',system-ui,sans-serif;
  overflow:hidden;
  position:relative;
  color:#fff;
}

.mk-canvas{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:52px 22px 60px;
  min-height:100vh;
  max-width:440px;
  margin:0 auto;
}

/* ── Sky layers ── */
.sky{position:absolute;inset:0;z-index:0;overflow:hidden}
.sky-base{position:absolute;inset:0;background:radial-gradient(ellipse 90% 60% at 50% -10%,#0d1533 0%,#040610 55%,#01020a 100%)}
.sky-mid{position:absolute;inset:0;background:radial-gradient(ellipse 70% 40% at 70% 20%,rgba(180,195,255,0.06) 0%,transparent 65%)}
.sky-low{position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(to top,rgba(1,2,8,0.95) 0%,transparent 100%)}

/* ── Moon ── */
.moon{
  position:absolute;
  top:48px;right:52px;
  width:64px;height:64px;
  border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#e8eeff 0%,#c5ceff 40%,#8899cc 100%);
  box-shadow:0 0 40px rgba(180,195,255,0.5),0 0 90px rgba(140,160,240,0.2),0 0 160px rgba(100,130,220,0.08);
  animation:moonpulse 6s ease-in-out infinite;
  z-index:1;
}
.moon-crescent{
  position:absolute;
  top:8px;left:10px;
  width:46px;height:46px;
  border-radius:50%;
  background:radial-gradient(circle at 60% 40%,transparent 55%,rgba(10,15,40,0.25) 100%);
}
@keyframes moonpulse{
  0%,100%{box-shadow:0 0 40px rgba(180,195,255,0.5),0 0 90px rgba(140,160,240,0.2)}
  50%{box-shadow:0 0 60px rgba(200,215,255,0.7),0 0 130px rgba(160,180,255,0.3),0 0 200px rgba(120,150,230,0.12)}
}

/* ── Stars ── */
.stars-layer{position:absolute;inset:0;z-index:1}

/* ── Mist ── */
.mist{
  position:absolute;
  bottom:0;left:0;right:0;
  height:260px;
  z-index:1;
  pointer-events:none;
  background:linear-gradient(to top,rgba(12,18,50,0.35) 0%,rgba(20,30,80,0.12) 40%,transparent 100%);
  animation:mistdrift 12s ease-in-out infinite alternate;
}
@keyframes mistdrift{
  from{transform:translateX(-8px) scaleX(1)}
  to{transform:translateX(8px) scaleX(1.03)}
}
.mist2{
  position:absolute;
  bottom:0;left:-10%;right:-10%;
  height:140px;
  z-index:1;
  pointer-events:none;
  background:radial-gradient(ellipse 80% 100% at 50% 100%,rgba(30,45,120,0.18) 0%,transparent 70%);
  animation:mistdrift2 18s ease-in-out infinite alternate;
}
@keyframes mistdrift2{
  from{transform:translateX(12px)}
  to{transform:translateX(-12px)}
}

/* ── Particle canvas ── */
#mk-particles{position:absolute;inset:0;z-index:1;pointer-events:none}

/* ── Profile ring ── */
.profile-wrap{
  position:relative;
  margin-bottom:22px;
  animation:fadedown 0.9s ease both;
}
.outer-ring{
  width:118px;height:118px;
  border-radius:50%;
  padding:2.5px;
  background:conic-gradient(from 0deg,rgba(160,175,255,0.08),rgba(220,230,255,0.7),rgba(180,200,255,0.15),rgba(220,230,255,0.6),rgba(160,175,255,0.08));
  animation:spinring 8s linear infinite;
  box-shadow:0 0 36px rgba(160,185,255,0.25),0 0 80px rgba(120,150,240,0.1);
}
@keyframes spinring{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.inner-ring{
  width:100%;height:100%;
  border-radius:50%;
  padding:3px;
  background:#02030a;
}
.avatar-circle{
  width:100%;height:100%;
  border-radius:50%;
  background:radial-gradient(circle at 38% 30%,#1a2155 0%,#080c22 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;
  font-size:26px;
  font-weight:700;
  color:#c5d0ff;
  letter-spacing:2px;
  position:relative;
  overflow:hidden;
}
.avatar-circle::after{
  content:'';
  position:absolute;
  top:-30%;left:-30%;
  width:60%;height:60%;
  border-radius:50%;
  background:rgba(220,230,255,0.07);
}

/* Crescent badge */
.moon-badge{
  position:absolute;
  bottom:4px;right:4px;
  width:30px;height:30px;
  border-radius:50%;
  background:linear-gradient(135deg,#1a2155,#0a0d20);
  border:1.5px solid rgba(200,215,255,0.35);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.6);
}

/* ── Typography ── */
.mk-title{
  font-family:'Cinzel',serif;
  font-size:clamp(19px,5.2vw,24px);
  font-weight:700;
  text-align:center;
  letter-spacing:1.5px;
  color:#dde6ff;
  text-shadow:0 0 30px rgba(160,185,255,0.4),0 0 60px rgba(120,155,240,0.15);
  animation:fadedown 1s 0.15s ease both;
  margin-bottom:6px;
  line-height:1.25;
}
.mk-sub{
  font-size:11px;
  color:rgba(170,190,255,0.5);
  text-align:center;
  letter-spacing:2.5px;
  text-transform:uppercase;
  animation:fadedown 1s 0.25s ease both;
  margin-bottom:8px;
}
.mk-divider{
  width:80px;height:1px;
  margin:0 auto 30px;
  background:linear-gradient(90deg,transparent,rgba(180,200,255,0.4),rgba(220,230,255,0.7),rgba(180,200,255,0.4),transparent);
  animation:fadedown 1s 0.3s ease both;
  position:relative;
}
.mk-divider::before,.mk-divider::after{
  content:'';
  position:absolute;
  top:-1px;
  width:4px;height:3px;
  border-radius:50%;
  background:rgba(220,230,255,0.7);
}
.mk-divider::before{left:14px}
.mk-divider::after{right:14px}

/* ── Link cards ── */
.mk-links{width:100%;display:flex;flex-direction:column;gap:13px}

.mk-btn{
  display:flex;
  align-items:center;
  gap:14px;
  padding:15px 18px;
  border-radius:14px;
  text-decoration:none;
  color:#dde6ff;
  font-size:14px;
  font-weight:500;
  letter-spacing:0.3px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.25s cubic-bezier(.34,1.56,.64,1),opacity 0.25s;
  border:1px solid rgba(180,200,255,0.1);
  background:rgba(10,14,38,0.65);
}
.mk-btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(180,200,255,0.04);
  opacity:0;
  transition:opacity 0.25s;
  border-radius:inherit;
}
.mk-btn::after{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(220,235,255,0.35),transparent);
  border-radius:inherit;
}
.mk-btn:hover{transform:translateY(-3px) scale(1.015);opacity:0.95}
.mk-btn:hover::before{opacity:1}
.mk-btn:active{transform:scale(0.97)}

.mk-btn-yt{border-color:rgba(255,70,70,0.22)}
.mk-btn-yt:hover{border-color:rgba(255,90,90,0.4);background:rgba(20,6,6,0.75)}
.mk-btn-fb{border-color:rgba(80,110,255,0.22)}

.mk-btn-wa{border-color:rgba(40,210,100,0.2)}
.mk-btn-wa:hover{border-color:rgba(40,210,100,0.38);background:rgba(4,14,10,0.8)}

.mk-icon{
  width:44px;height:44px;
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  position:relative;
}
.mk-icon svg{width:22px;height:22px}
.ic-yt{background:rgba(200,30,30,0.15);border:1px solid rgba(255,80,80,0.18)}
.ic-fb{background:rgba(50,80,200,0.15);border:1px solid rgba(80,120,255,0.18)}

.mk-btn-text{flex:1}
.mk-btn-name{display:block;font-size:14px;font-weight:600;color:#cdd8ff}
.mk-btn-handle{display:block;font-size:11px;color:rgba(160,180,255,0.4);margin-top:2px;font-weight:400}

.mk-arrow{
  font-size:16px;
  color:rgba(180,200,255,0.3);
  transition:transform 0.2s,color 0.2s;
  flex-shrink:0;
}
.mk-btn:hover .mk-arrow{transform:translateX(4px);color:rgba(200,220,255,0.7)}

/* ── Glow lines ── */
.glow-line{
  width:100%;height:1px;

/* ── Eye of Ra footer ── */
.mk-footer{

}
.ra-symbol{

.follow-label{

}
.copyright{

}

/* ── Stagger animations ── */
@keyframes fadedown{
  from{opacity:0;transform:translateY(-20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadein{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}

.mk-btn:nth-child(1){animation:fadein 0.7s 0.38s ease both}
.mk-btn:nth-child(2){animation:fadein 0.7s 0.5s ease both}
.mk-btn:nth-child(3){animation:fadein 0.7s 0.62s ease both}
.mk-btn:nth-child(4){animation:fadein 0.7s 0.74s ease both}

.mk-sub{animation:fadedown 0.85s 0.22s ease both}
.mk-divider{animation:fadedown 0.85s 0.28s ease both}
</style>

<script>
(function(){
  const c = document.getElementById('mk-particles');
  if(!c) return;
  const ctx = c.getContext('2d');
  let W, H;

  function resize(){
    const root = c.closest('.mk-root') || document.body;
    W = c.width = root.offsetWidth || window.innerWidth;
    H = c.height = root.offsetHeight || window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const pts = [];
  for(let i = 0; i < 70; i++){
    pts.push({
      x: Math.random() * 1200,
      y: Math.random() * 900,
      r: Math.random() * 1.2 + 0.3,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.15,
      phase: Math.random() * Math.PI * 2,
      speed: 0.0005 + Math.random() * 0.001
    });
  }

  const moonPts = [];
  for(let i = 0; i < 8; i++){
    const angle = (i / 8) * Math.PI * 2;
    moonPts.push({
      x: (W * 0.82) + Math.cos(angle) * (30 + Math.random() * 60),
      y: (62) + Math.sin(angle) * (30 + Math.random() * 60),
      r: Math.random() * 0.9 + 0.2,
      vx: Math.cos(angle) * 0.06,
      vy: Math.sin(angle) * 0.06,
      phase: Math.random() * Math.PI * 2
    });
  }

  let t = 0;
  function draw(){
    t += 0.016;
    ctx.clearRect(0, 0, W, H);

    for(const p of pts){
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0) p.x = W;
      if(p.x > W) p.x = 0;
      if(p.y < 0) p.y = H;
      if(p.y > H) p.y = 0;
      const a = 0.15 + 0.12 * Math.sin(t * p.speed * 60 + p.phase);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(190,210,255,${a})`;
      ctx.fill();
    }

    for(const p of moonPts){
      p.x += p.vx; p.y += p.vy;
      const a = 0.25 + 0.2 * Math.sin(t * 0.8 + p.phase);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,235,255,${a})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
